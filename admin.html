<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Taxas — PayMilles</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .admin { max-width: 760px; margin: 0 auto; padding: 18px 20px 50px; }
    .admin h1 {
      font-family: var(--f-display);
      font-size: 1.4rem;
      margin: 0 0 4px;
    }
    .admin p.sub { color: #b3a98f; font-size: 0.9rem; margin: 0 0 24px; }

    .cartao {
      background: var(--tinta-2);
      border: 1px solid #2a2620;
      border-radius: 18px;
      padding: 20px 20px 16px;
      margin-bottom: 18px;
    }
    .cartao h2 {
      font-family: var(--f-display);
      font-size: 1.05rem;
      margin: 0 0 14px;
      color: var(--ouro);
    }
    .grade {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .taxa label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #b3a98f;
      margin-bottom: 5px;
    }
    .taxa .caixa {
      display: flex;
      align-items: center;
      background: var(--tinta);
      border: 1px solid #383225;
      border-radius: 10px;
      padding: 0 12px;
    }
    .taxa .caixa:focus-within { border-color: var(--ouro); }
    .taxa input {
      flex: 1; width: 100%;
      background: none; border: none; outline: none;
      color: var(--branco-fosco);
      font-family: var(--f-dados);
      font-weight: 600;
      font-size: 1.1rem;
      padding: 10px 0;
      font-variant-numeric: tabular-nums;
    }
    .taxa .caixa span {
      font-family: var(--f-dados);
      color: #8d8470;
      margin-left: 6px;
    }

    .acoes {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
    }
    .acoes .caixa-senha {
      display: flex;
      align-items: center;
      background: var(--tinta);
      border: 1px solid #383225;
      border-radius: 999px;
      padding: 0 16px;
      flex: 1;
      min-width: 220px;
    }
    .acoes .caixa-senha:focus-within { border-color: var(--ouro); }
    .acoes input {
      flex: 1; width: 100%;
      background: none; border: none; outline: none;
      color: var(--branco-fosco);
      font-family: var(--f-corpo);
      font-size: 0.95rem;
      padding: 11px 0;
    }
    .btn-salvar {
      font-family: var(--f-display);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--tinta);
      background: var(--ouro);
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    .btn-salvar:hover { background: var(--ouro-claro); transform: translateY(-1px); }
    .btn-salvar:disabled { opacity: 0.55; cursor: wait; transform: none; }

    .aviso {
      margin-top: 14px;
      font-size: 0.9rem;
      min-height: 1.4em;
    }
    .aviso.ok { color: #7fce8f; }
    .aviso.erro { color: #e08585; }
    .voltar { color: var(--ouro); font-size: 0.85rem; text-decoration: none; }
    .voltar:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header class="topo">
    <div class="topo__marca">
      <img id="marcaLogo" alt="" hidden />
      <span id="marcaNome"></span>
    </div>
    <a class="voltar" href="index.html">← voltar ao simulador</a>
  </header>

  <main class="admin">
    <h1>Painel de Taxas</h1>
    <p class="sub">
      Altere os valores abaixo e clique em salvar. O simulador é atualizado
      na hora, para todos os visitantes. Digite as taxas em porcentagem
      (ex.: <strong>1,39</strong> para 1,39%).
    </p>

    <div id="formulario"></div>

    <div class="cartao">
      <h2>Salvar alterações</h2>
      <div class="acoes">
        <div class="caixa-senha">
          <input id="senha" type="password" placeholder="Senha de administrador"
                 autocomplete="current-password" />
        </div>
        <button class="btn-salvar" id="btnSalvar" type="button">Salvar taxas</button>
      </div>
      <p class="aviso" id="aviso" aria-live="polite"></p>
    </div>
  </main>

  <script src="js/taxas.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
